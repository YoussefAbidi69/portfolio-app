<section id="contact" class="contact" appScrollReveal>
    <div class="container" *ngIf="profile$ | async as profile">
        <app-section-heading
            [num]="'CONTACT.NUM' | translate"
            [title]="'CONTACT.TITLE' | translate">
        </app-section-heading>

        <div class="contact-wrap">
            <p class="contact-text">{{ 'CONTACT.TEXT' | translate }}</p>

            <div class="contact-actions">
                <a [href]="'mailto:' + profile.email" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    {{ 'CONTACT.CTA_EMAIL' | translate }}
                    <span class="arrow">→</span>
                </a>

                <a *ngIf="profile.social.linkedin" [href]="profile.social.linkedin" target="_blank" class="btn btn-outline">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19a.66.66 0 000 .14V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/>
                    </svg>
                    {{ 'CONTACT.CTA_LINKEDIN' | translate }}
                </a>

                <a *ngIf="profile.social.github" [href]="profile.social.github" target="_blank" class="btn btn-outline">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                    </svg>
                    {{ 'CONTACT.CTA_GITHUB' | translate }}
                </a>
            </div>

            <div class="email-line">
                <span class="prompt">$</span>
                <span class="cmd-text">echo</span>
                <a [href]="'mailto:' + profile.email" class="email">{{ profile.email }}</a>
            </div>
        </div>
    </div>
</section>
