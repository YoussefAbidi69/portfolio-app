<section id="stack" class="skills" appScrollReveal>
    <div class="container">
        <app-section-heading
            [num]="'SKILLS.NUM' | translate"
            [title]="'SKILLS.TITLE' | translate"
            [meta]="(meta$ | async) || ''">
        </app-section-heading>

        <div class="grid" *ngIf="skills$ | async as categories">
            <div class="cat-card" *ngFor="let c of categories" [attr.data-accent]="c.accent">
                <div class="accent-bar"></div>
                <div class="cat-head">
                    <div class="cat-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path [attr.d]="iconPaths[c.icon] || iconPaths['code']"/>
                        </svg>
                    </div>
                    <h3 class="cat-title">{{ c.title | translate }}</h3>
                </div>
                <div class="badges">
                    <app-tech-badge
                        *ngFor="let s of c.skills"
                        [name]="s.name"
                        [color]="s.color">
                    </app-tech-badge>
                </div>
            </div>
        </div>
    </div>
</section>
