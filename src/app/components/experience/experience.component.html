<section id="experience" class="experience" appScrollReveal>
    <div class="container">
        <app-section-heading
            [num]="'EXPERIENCE.NUM' | translate"
            [title]="'EXPERIENCE.TITLE' | translate">
        </app-section-heading>

        <div class="timeline" *ngIf="experiences$ | async as exps">
            <div class="tl-line"></div>

            <div class="tl-item" *ngFor="let exp of exps">
                <div class="tl-dot" [class.current]="exp.current"></div>

                <div class="tl-card">
                    <div class="tl-head">
                        <div class="tl-meta">
                            <div class="tl-role">{{ exp.role | translate }}</div>
                            <div class="company-and-links">
                                <a *ngIf="exp.companyUrl" [href]="exp.companyUrl" target="_blank" class="tl-company">
                                    &#64; {{ exp.company | translate }}
                                </a>
                                <span *ngIf="!exp.companyUrl" class="tl-company">
                                    &#64; {{ exp.company | translate }}
                                </span>
                                
                                <div class="links" *ngIf="exp.links">
                                    <a *ngIf="exp.links.github" [href]="exp.links.github" target="_blank" [attr.aria-label]="'GitHub'">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                                        </svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                        <span class="tl-period">{{ exp.period | translate }}</span>
                    </div>

                    <p class="tl-desc">{{ exp.description | translate }}</p>

                    <div class="tl-stack">
                        <app-tech-badge *ngFor="let t of exp.stack" [name]="t"></app-tech-badge>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
